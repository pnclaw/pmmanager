name: CI

on:
  push:
    branches:
      - develop
      - "feature/**"
      - "bugfix/**"
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore pmm.slnx

      - name: Build
        run: dotnet build pmm.slnx -m:1 -p:BuildInParallel=false --no-restore -c Release

      - name: Test
        run: dotnet test pmm.slnx --no-build -c Release --logger "console;verbosity=normal" --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
