name: Build Windows Installer

on:
  push:
    branches:
      - feature/installer   # temporary — remove before merge
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        shell: bash
        run: |
          cd src/pmm.Frontend
          npm ci
          npm run build
          cp -r dist ../../src/pmm.Api/wwwroot

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish (win-x64 self-contained)
        shell: bash
        run: |
          dotnet publish src/pmm.Api/pmm.Api.csproj \
            -r win-x64 \
            --self-contained true \
            -c Release \
            -o installer/publish

      - name: Install NSIS
        run: choco install nsis --yes

      - name: Build installer
        shell: bash
        run: |
          cd installer
          "/c/Program Files (x86)/NSIS/makensis.exe" \
            /DAPP_VERSION=${{ env.VERSION }} \
            setup.nsi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer/PrivateMediaManager-*.exe

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/PrivateMediaManager-*.exe
